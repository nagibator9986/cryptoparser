sources:
  # --- Tier 1: Казахстан, регуляторы и официальные площадки ---

  - id: nationalbank-kz
    name: National Bank of Kazakhstan
    # The press-releases page is a news *list*, so html_list extracts each
    # linked release (title + date + body) instead of the page chrome.
    url: https://nationalbank.kz/ru/news/press-relizy
    type: html
    html_list: true
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 1
    poll_interval_minutes: 180

  - id: afsa-aifc
    name: AFSA
    url: https://afsa.aifc.kz/news
    type: html
    html_list: true
    enabled: true
    language_hint: en
    country_hint: KZ
    priority_hint: 1
    poll_interval_minutes: 240

  - id: aifc
    name: Astana International Financial Centre
    url: https://aifc.kz/news
    type: html
    html_list: true
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 1
    poll_interval_minutes: 240

  - id: ardfm
    name: ARDFM (Agency for Regulation and Development of Financial Markets)
    # gov.kz is a JS SPA: static HTML has no news. We query its public Apollo
    # GraphQL backend instead (gov_kz collector). project slug = ardfm.
    url: https://www.gov.kz/memleket/entities/ardfm?lang=ru
    type: gov_kz
    gov_kz_project: ardfm
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 1
    poll_interval_minutes: 360

  - id: astanahub
    name: Astana Hub
    url: https://astanahub.com/ru/
    type: html
    html_list: true
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 1
    poll_interval_minutes: 360

  - id: kase
    name: Kazakhstan Stock Exchange
    url: https://www.kase.kz/ru/news/
    type: html
    html_list: true
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 2
    poll_interval_minutes: 360

  # --- Tier 2: казахстанские деловые СМИ (RSS) ---

  - id: kapital-kz
    name: Kapital.kz
    url: https://kapital.kz/feed
    type: rss
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 2
    poll_interval_minutes: 60

  - id: kursiv-kz
    name: Kursiv Media (KZ)
    url: https://kz.kursiv.media/feed/
    type: rss
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 2
    poll_interval_minutes: 60

  - id: forbes-kz
    name: Forbes.kz
    url: https://forbes.kz/finances/finance
    type: html
    html_list: true
    enabled: true
    language_hint: ru
    country_hint: KZ
    priority_hint: 2
    poll_interval_minutes: 120

  # --- Tier 2: СНГ — крупные RSS-источники ---

  - id: forklog
    name: ForkLog
    url: https://forklog.com/feed/
    type: rss
    enabled: true
    language_hint: ru
    country_hint: RU
    priority_hint: 2
    poll_interval_minutes: 60

  - id: incrypted
    name: Incrypted
    url: https://incrypted.com/feed/
    type: rss
    enabled: true
    language_hint: ru
    country_hint: UA
    priority_hint: 2
    poll_interval_minutes: 60

  - id: coinspot
    name: CoinSpot
    url: https://www.coinspot.io/feed/
    type: rss
    enabled: true
    language_hint: ru
    country_hint: RU
    priority_hint: 2
    poll_interval_minutes: 90

  - id: decenter
    name: DeCenter
    url: https://decenter.org/ru/rss
    type: rss
    enabled: true
    language_hint: ru
    country_hint: RU
    priority_hint: 2
    poll_interval_minutes: 90

  - id: habr-crypto
    name: Habr — Cryptocurrencies hub
    url: https://habr.com/ru/rss/hub/cryptocurrency/all/
    type: rss
    enabled: true
    language_hint: ru
    country_hint: RU
    priority_hint: 3
    poll_interval_minutes: 120

  # --- Tier 2: СНГ регулятор (RU) ---

  - id: cbr-ru
    name: Bank of Russia — News
    # cbr.ru blocks HTTPS for many client TLS stacks; HTTP RSS endpoint
    # is the canonical one published by the regulator.
    url: http://www.cbr.ru/rss/RssNews
    type: rss
    enabled: true
    language_hint: ru
    country_hint: RU
    priority_hint: 2
    poll_interval_minutes: 180

  # --- Tier 3: международные крипто-медиа ---
  # Понижены приоритет и частота опроса: они дают самый большой поток,
  # но самый низкий сигнал для банка РК. Полностью отключать нельзя —
  # глобальные критические события (USDT depeg, TOP-30 hacks) идут через них.

  - id: coindesk
    name: CoinDesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    type: rss
    enabled: true
    language_hint: en
    country_hint: US
    priority_hint: 3
    poll_interval_minutes: 90

  - id: cointelegraph
    name: Cointelegraph
    url: https://cointelegraph.com/rss
    type: rss
    enabled: true
    language_hint: en
    country_hint: US
    priority_hint: 3
    poll_interval_minutes: 90

  # Binance News — открытый, но НЕ drop-in источник (см. tz-gap-analysis ФТ-1.1).
  # Оценка по запросу заказчика: «открытый источник данных?» — да, открытый, но:
  #   1. Публичный RSS (binance.com/en/square/rss) отдаёт HTTP 202 за Akamai
  #      bot-protection — серверный клиент не получает валидный RSS.
  #   2. JSON-эндпоинт bapi (.../cms/article/list/query) отдаёт 200, но статьи
  #      вложены в data.catalogs[].articles и содержат только title + releaseDate
  #      (epoch ms), без body, url и изображения. Generic json_api collector
  #      схлопнул бы их в один URL при дедупе и потерял бы даты.
  # Поэтому источник требует source-specific collector (построение url из `code`,
  # парс epoch-ms даты, дозагрузка тела), что вынесено в production backlog.
  # Содержательно это листинги/анонсы — Tier-3, низкий сигнал для банка РК.
  # ToS: массовая перепубликация контента Binance регулируется их условиями.
  - id: binance-news
    name: Binance News
    url: https://www.binance.com/bapi/composite/v1/public/cms/article/list/query?type=1&pageNo=1&pageSize=20
    type: json_api
    enabled: false
    language_hint: en
    country_hint: US
    priority_hint: 3
    poll_interval_minutes: 120
